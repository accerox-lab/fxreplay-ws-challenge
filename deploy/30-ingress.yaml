apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-server
  namespace: ws-demo
  annotations:
    # WebSocket-specific tunables. ingress-nginx upgrades HTTP/1.1 to WS
    # automatically when the client sends the Upgrade header, but the default
    # read/send timeout is 60s which would kill any idle long-lived connection.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Buffer disabled: WS frames are tiny and latency-sensitive.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: ws.local.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ws-server
                port:
                  number: 80
