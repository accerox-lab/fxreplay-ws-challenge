apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  namespace: ws-demo
  labels:
    app.kubernetes.io/name: ws-server
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ws-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ws-server
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Tolerate a long drain so in-flight WebSocket sessions are sent a close
      # frame and clients reconnect instead of getting TCP RSTs.
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ws-server
      containers:
        - name: ws-server
          # Image reference is overridden by kustomization.yaml `images:` so
          # this name is just a key, not the actual image that runs.
          image: ws-server
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: "8080"
            - name: REDIS_ADDR
              value: "redis.ws-demo.svc.cluster.local:6379"
            # PRESTOP_DRAIN: pause between readiness=false and connection close,
            # giving kube-proxy/iptables time to stop sending new traffic.
            - name: PRESTOP_DRAIN
              value: "10s"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Buys time for the readiness change to propagate before the
                # container receives SIGTERM. Combined with PRESTOP_DRAIN in the
                # app, this gives clients a clean close instead of TCP reset.
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: ws-server
  namespace: ws-demo
  labels:
    app.kubernetes.io/name: ws-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ws-server
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ws-server
  namespace: ws-demo
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ws-server
