name: build-and-deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # -------------------------------------------------------------------------
  # Stage 1 — lint + unit-equivalent checks. Fast (~10s) so PRs get feedback
  # before the slow build kicks in.
  # -------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: app/go.sum
      - name: go vet
        working-directory: app
        run: go vet ./...
      - name: go build (no output)
        working-directory: app
        run: go build -o /dev/null ./...
      - name: kustomize build sanity check
        run: |
          curl -sSL -o /tmp/kustomize.tgz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tgz -C /usr/local/bin/
          kustomize build deploy/ > /dev/null
          kustomize build observability/ > /dev/null

  # -------------------------------------------------------------------------
  # Stage 2 — build the image with BuildKit, push to GHCR. Tags applied:
  #   sha-<short>  - immutable, every push gets one
  #   <branch>     - mutable, latest commit on that branch
  #   v*           - for `v*` tag pushes (semver releases)
  #   latest       - only on main
  # Multi-arch is intentionally skipped: kind on amd64 is all that the
  # in-cluster smoke test uses. Add `linux/arm64` to platforms when needed.
  # -------------------------------------------------------------------------
  build:
    needs: lint
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Stage 3 — bring up a kind cluster INSIDE the runner, install the app
  # against the freshly built image, run the cross-pod broadcast smoke test.
  # This is the "validation step" required by the challenge: it proves the
  # built image is actually deployable AND functional end-to-end.
  # -------------------------------------------------------------------------
  e2e:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install kind + kustomize
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
      - name: Create cluster
        run: kind create cluster --config .kind/cluster.yaml --wait 90s
      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller --timeout=120s
      - name: Set image to the freshly built tag
        working-directory: deploy
        run: kustomize edit set image ws-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)
      - name: Deploy app
        run: kubectl apply -k deploy/ --validate=false  # ServiceMonitor CRD is missing here; that's fine
        continue-on-error: true  # the SMonitor "no matches for kind" is expected without operator
      - name: Wait for rollout
        run: |
          kubectl -n ws-demo wait --for=condition=ready pod \
            -l app.kubernetes.io/name=ws-server --timeout=120s
      - name: Map host port 80 -> ingress (already done by kind config)
        run: kubectl get ingress -n ws-demo
      - name: Run cross-pod broadcast smoke test
        run: |
          npm install --silent ws
          node hack/broadcast-test.js
      - name: Dump pod logs on failure
        if: failure()
        run: kubectl -n ws-demo logs -l app.kubernetes.io/name=ws-server --tail=200 --prefix
