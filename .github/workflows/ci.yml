name: build-and-deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt-in to Node.js 24 for JS actions. GitHub is migrating off Node 20
  # (default change ~June 2026); this silences the deprecation warning and
  # validates our actions work on the new runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write  # bump-tag job needs to push the tag update back to main
  packages: write
  id-token: write

jobs:
  # -------------------------------------------------------------------------
  # Stage 1 — lint + unit-equivalent checks. Fast (~10s) so PRs get feedback
  # before the slow build kicks in.
  # -------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: app/go.sum
      - name: go vet
        working-directory: app
        run: go vet ./...
      - name: go build (no output)
        working-directory: app
        run: go build -o /dev/null ./...
      - name: kustomize build sanity check
        run: |
          curl -sSL -o /tmp/kustomize.tgz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tgz -C /usr/local/bin/
          kustomize build deploy/ > /dev/null
          kustomize build observability/ > /dev/null

  # -------------------------------------------------------------------------
  # Stage 2 — build the image with BuildKit, push to GHCR. Tags applied:
  #   sha-<short>  - immutable, every push gets one
  #   <branch>     - mutable, latest commit on that branch
  #   v*           - for `v*` tag pushes (semver releases)
  #   latest       - only on main
  # Multi-arch is intentionally skipped: kind on amd64 is all that the
  # in-cluster smoke test uses. Add `linux/arm64` to platforms when needed.
  # -------------------------------------------------------------------------
  build:
    needs: lint
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Stage 3 — bring up a kind cluster INSIDE the runner, install the app
  # against the freshly built image, run the cross-pod broadcast smoke test.
  # This is the "validation step" required by the challenge: it proves the
  # built image is actually deployable AND functional end-to-end.
  # -------------------------------------------------------------------------
  e2e:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install kind + kustomize
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
      - name: Create cluster
        run: kind create cluster --config .kind/cluster.yaml --wait 90s
      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller --timeout=120s
      - name: Install Prometheus Operator CRDs (so ServiceMonitor applies)
        # Just the CRDs, not the full operator. The smoke test doesn't care
        # whether scraping actually happens; this only ensures `kubectl apply -k`
        # doesn't error on the unknown CRD kind.
        run: |
          for crd in alertmanagerconfigs alertmanagers podmonitors probes prometheusagents prometheuses prometheusrules scrapeconfigs servicemonitors thanosrulers; do
            kubectl apply --server-side -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.76.1/example/prometheus-operator-crd/monitoring.coreos.com_${crd}.yaml
          done
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull the freshly built image and side-load into kind
        # The build job pushed to GHCR (private by default). The runner has
        # write+read auth via GITHUB_TOKEN. We pull from GHCR and side-load
        # into the kind cluster so the cluster never needs registry credentials.
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          docker pull "$IMG"
          kind load docker-image "$IMG" --name fxreplay
          echo "IMG=$IMG" >> "$GITHUB_ENV"
      - name: Set kustomize image to the pulled tag
        working-directory: deploy
        run: kustomize edit set image ws-server="$IMG"
      - name: Deploy app
        run: kubectl apply -k deploy/
      - name: Wait for rollout
        run: |
          kubectl -n ws-demo wait --for=condition=ready pod \
            -l app.kubernetes.io/name=ws-server --timeout=120s
      - name: Show ingress
        run: kubectl get ingress -n ws-demo
      - name: Run cross-pod broadcast smoke test
        run: |
          npm install --silent ws
          node hack/broadcast-test.js
      - name: Dump pod logs on failure
        if: failure()
        run: |
          kubectl -n ws-demo describe pods -l app.kubernetes.io/name=ws-server || true
          kubectl -n ws-demo logs -l app.kubernetes.io/name=ws-server --tail=200 --prefix || true

  # -------------------------------------------------------------------------
  # Stage 4 — GitOps promotion. Only after e2e proves the image is good, we
  # bump the image tag in `deploy/kustomization.yaml` on main and push it
  # back. ArgoCD (running in the target cluster) polls the repo, detects the
  # commit, and rolls the Deployment to the new image. The bot commit carries
  # `[skip ci]` so this workflow does not re-trigger itself.
  #
  # This is the "promoted into a running Kubernetes deployment" step the
  # challenge asks for: a source code change ends up as a pod running new code
  # without any human running kubectl.
  # -------------------------------------------------------------------------
  bump-tag:
    needs: e2e
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          # default token has write because the workflow declared it above;
          # the checkout action stores it so subsequent `git push` works.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
      - name: Bump image tag to verified SHA
        working-directory: deploy
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kustomize edit set image ws-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG
          echo "Bumped to $TAG"
      - name: Commit and push (skip CI re-trigger)
        run: |
          if git diff --quiet deploy/kustomization.yaml; then
            echo "No tag change — kustomization already at this SHA."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit -m "ci: promote image to sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
