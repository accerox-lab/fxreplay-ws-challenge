apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: observability
type: Opaque
stringData:
  # Demo only. Production: pull from external secret store (ExternalSecrets,
  # SealedSecrets, Vault, etc.) — never commit real creds.
  admin-user: admin
  admin-password: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: observability
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ws
  namespace: observability
data:
  ws-server.json: |
    {
      "uid": "ws-server",
      "title": "WebSocket Service",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active connections",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            { "expr": "sum(ws_active_connections)", "refId": "A" }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Connections per pod",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            { "expr": "ws_active_connections", "refId": "A", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Messages in / sec (per pod)",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(ws_messages_received_total[1m])", "refId": "A", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Messages out / sec (per pod)",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(ws_messages_sent_total[1m])", "refId": "A", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Broadcast fan-out latency (p95)",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(ws_broadcast_latency_seconds_bucket[5m])))", "refId": "A" }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Redis publish errors / sec",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(ws_redis_publish_errors_total[1m])", "refId": "A" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef: { name: grafana-admin, key: admin-user }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: grafana-admin, key: admin-password }
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-providers, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
            - { name: data, mountPath: /var/lib/grafana }
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-providers
          configMap: { name: grafana-dashboard-providers }
        - name: dashboards
          configMap: { name: grafana-dashboard-ws }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.local.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port: { number: 80 }
